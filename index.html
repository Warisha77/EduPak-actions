<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPak.pk | Premium DevOps & Cloud Academy</title>
    <link rel="stylesheet" href="style.css">
    <!-- Clean modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-container">
        <div class="glow-sphere"></div>
    </div>
    
    <main class="dashboard-card">
        <header class="card-header">
            <span class="badge">Enterprise Learning</span>
            <h1>EduPak<span class="accent">.pk</span></h1>
            <p class="subtitle">Accelerate your trajectory in DevOps & Cloud Architecture.</p>
        </header>

        <section class="features-grid">
            <div class="feature-item">
                <span class="icon">🚀</span>
                <h3>CI/CD Pipelines</h3>
            </div>
            <div class="feature-item">
                <span class="icon">⚙️</span>
                <h3>Automation</h3>
            </div>
            <div class="feature-item">
                <span class="icon">📄</span>
                <h3>Infrastructure</h3>
            </div>
        </section>

        <footer class="card-actions">
            <button id="actionBtn" class="btn-primary">Initialize Console</button>
            <div id="statusMessage" class="status-wrapper hidden">
                <div class="status-indicator"></div>
                <p id="statusText"></p>
            </div>
        </footer>
    </main>
    <script src="main.js"></script>
</body>
</html>
