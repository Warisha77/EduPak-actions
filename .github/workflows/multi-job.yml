name: Task 2 - Multi-Job
on:
  push:
    branches:
      - main

env:
  APP_NAME: EduPak.pk
  VERSION: 1.1.0

jobs:
    check-files:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: list current workspace files
          run: ls -la
    
    print-info:
      runs-on: ubuntu-latest
      needs: check-files
      steps:
        - name: Output Environment Details
          run: |
           echo "Application: ${{ env.APP_NAME }}"
           echo "Target Version: ${{ env.VERSION }}"
    
    final-message:
      runs-on: ubuntu-latest
      needs: print-info
      steps:
        - name: Display Final Message
          run: echo "All tasks completed successfully!"